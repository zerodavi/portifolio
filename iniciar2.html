<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Robot Mission</title>

<style>
body {
  margin: 0;
  background: radial-gradient(#0b1d2a, #000);
  font-family: Arial, sans-serif;
  color: #00e5ff;
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
}

.menu {
  text-align: center;
  max-width: 620px;
}

h1 {
  font-size: 48px;
  margin-bottom: 8px;
  text-shadow: 0 0 15px #00e5ff;
}

p {
  color: #ccc;
  margin-bottom: 24px;
}

button {
  padding: 15px 40px;
  font-size: 20px;
  border: none;
  border-radius: 8px;
  background: #00e5ff;
  color: #000;
  cursor: pointer;
  box-shadow: 0 0 20px #00e5ff;
  transition: 0.2s;
}

button:hover {
  background: #00bcd4;
}

.loading {
  margin-top: 16px;
  display: none;
  font-size: 14px;
  color: #aaa;
}

.tip-box {
  margin-top: 26px;
  min-height: 40px;
  font-size: 15px;
  color: #ddd;
  opacity: 0;
  transition: opacity 0.6s ease;
}

.tip-box.show {
  opacity: 1;
}

/* Contador customizado */
.visitor-counter {
  margin-top: 32px;
  font-size: 13px;
  color: #555;
  letter-spacing: 1px;
  text-transform: uppercase;
}

.visitor-badge {
  display: inline-flex;
  align-items: center;
  margin-top: 8px;
  border-radius: 4px;
  overflow: hidden;
  font-size: 12px;
  font-family: Arial, sans-serif;
  box-shadow: 0 0 8px rgba(0, 229, 255, 0.3);
}

.badge-label {
  background: #111827;
  color: #fff;
  padding: 5px 10px;
  letter-spacing: 0.5px;
}

.badge-count {
  background: #00E5FF;
  color: #000;
  padding: 5px 10px;
  font-weight: bold;
  min-width: 40px;
  text-align: center;
  letter-spacing: 0.5px;
  transition: opacity 0.4s;
}
</style>
</head>

<body>

<div class="menu">
  <h1>ROBOT MISSION</h1>
  <p>Um jogo de ação futurista</p>

  <button onclick="startGame()">▶ INICIAR</button>

  <div class="tip-box" id="tip"></div>

  <div class="loading" id="loading">
    Carregando jogo...
  </div>

  <div class="visitor-counter">
    <div class="visitor-badge">
      <span class="badge-label">VISITAS</span>
      <span class="badge-count" id="visit-count">…</span>
    </div>
  </div>
</div>

<script>
// =============================================
// DICAS
// =============================================
const tips = [
  "🔫 O revólver possui apenas 4 balas. Recarregue com sabedoria.",
  "📦 Munição extra vai para a reserva automaticamente.",
  "🔑 Baús só podem ser abertos com chave.",
  "🏪 A loja vende chave, vida e munição.",
  "🛡️ Alguns inimigos podem defender tiros.",
  "🎯 Complete missões para ganhar moedas.",
  "💣 Robôs atiradores explodem se você chegar perto.",
  "⌨️ Use E para interagir e Espaço para atacar."
];

tips.sort(() => Math.random() - 0.5);

let tipIndex = 0;
const tipEl = document.getElementById("tip");

function showTip() {
  tipEl.classList.remove("show");
  setTimeout(() => {
    tipEl.textContent = tips[tipIndex];
    tipEl.classList.add("show");
    tipIndex = (tipIndex + 1) % tips.length;
  }, 300);
}

showTip();
setInterval(showTip, 3500);

// =============================================
// CONTADOR DE VISITAS — SUPABASE + LOCALSTORAGE
// =============================================
const SUPABASE_URL = "https://dyvwcrmtminwcwyteynm.supabase.co";
const SUPABASE_KEY = "sb_publishable_aLscpSRu7Y0T2e4QjviYYA_ZAFhqZAH";
const STORAGE_KEY  = "robot_mission_visited";

const countEl = document.getElementById("visit-count");

async function fetchCount() {
  const res = await fetch(
    `${SUPABASE_URL}/rest/v1/contador?id=eq.1&select=visitas`,
    { headers: { apikey: SUPABASE_KEY, Authorization: `Bearer ${SUPABASE_KEY}` } }
  );
  const data = await res.json();
  return data[0]?.visitas ?? 0;
}

async function incrementCount(current) {
  await fetch(
    `${SUPABASE_URL}/rest/v1/contador?id=eq.1`,
    {
      method: "PATCH",
      headers: {
        apikey: SUPABASE_KEY,
        Authorization: `Bearer ${SUPABASE_KEY}`,
        "Content-Type": "application/json",
        Prefer: "return=minimal"
      },
      body: JSON.stringify({ visitas: current + 1 })
    }
  );
  return current + 1;
}

async function initCounter() {
  try {
    const alreadyVisited = localStorage.getItem(STORAGE_KEY);
    let count = await fetchCount();

    if (!alreadyVisited) {
      // Primeira vez neste navegador — incrementa
      count = await incrementCount(count);
      localStorage.setItem(STORAGE_KEY, "1");
    }

    countEl.textContent = count;
  } catch (err) {
    console.error("Erro no contador:", err);
    countEl.textContent = "—";
  }
}

initCounter();

// =============================================
// INICIAR JOGO
// =============================================
function startGame() {
  document.querySelector("button").style.display = "none";
  document.getElementById("loading").style.display = "block";
  setTimeout(() => {
    window.location.href = "index.html";
  }, 800);
}
</script>

</body>
</html>
