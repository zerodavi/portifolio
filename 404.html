<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Gerador de Currículo</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #0d1117;
      color: #fff;
      margin: 0;
      padding: 20px;
    }
    h1 {
      text-align: center;
      color: #58a6ff;
    }
    .container {
      max-width: 900px;
      margin: auto;
    }
    input, textarea {
      width: 100%;
      padding: 10px;
      margin: 5px 0 15px;
      border-radius: 8px;
      border: none;
      background: #161b22;
      color: #fff;
    }
    button {
      width: 100%;
      padding: 12px;
      background: #238636;
      color: white;
      border: none;
      border-radius: 10px;
      font-size: 16px;
      cursor: pointer;
    }
    button:hover {
      background: #2ea043;
    }
    .preview {
      margin-top: 30px;
      background: white;
      color: black;
      padding: 20px;
      border-radius: 10px;
    }
    @media (max-width: 600px) {
      body {
        padding: 10px;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>Gerador de Currículo</h1>

    <input type="text" id="nome" placeholder="Nome completo">
    <input type="text" id="email" placeholder="Email">
    <input type="text" id="telefone" placeholder="Telefone">
    <textarea id="resumo" placeholder="Resumo profissional"></textarea>
    <textarea id="experiencia" placeholder="Experiência profissional"></textarea>
    <textarea id="formacao" placeholder="Formação acadêmica"></textarea>
    <textarea id="habilidades" placeholder="Habilidades"></textarea>

    <button onclick="gerarCurriculo()">Gerar Currículo</button>
    <button onclick="baixarPDF()">Baixar PDF</button>

    <div id="preview" class="preview"></div>
  </div>

  <script>
    function gerarCurriculo() {
      const nome = document.getElementById('nome').value;
      const email = document.getElementById('email').value;
      const telefone = document.getElementById('telefone').value;
      const resumo = document.getElementById('resumo').value;
      const experiencia = document.getElementById('experiencia').value;
      const formacao = document.getElementById('formacao').value;
      const habilidades = document.getElementById('habilidades').value;

      document.getElementById('preview').innerHTML = `
        <h2>${nome}</h2>
        <p><strong>Email:</strong> ${email}</p>
        <p><strong>Telefone:</strong> ${telefone}</p>
        <h3>Resumo</h3>
        <p>${resumo}</p>
        <h3>Experiência</h3>
        <p>${experiencia}</p>
        <h3>Formação</h3>
        <p>${formacao}</p>
        <h3>Habilidades</h3>
        <p>${habilidades}</p>
      `;
    }

    function baixarPDF() {
      const conteudo = document.getElementById('preview').innerHTML;
      const janela = window.open('', '', 'width=800,height=600');
      janela.document.write(`
        <html>
        <head><title>Currículo</title></head>
        <body>${conteudo}</body>
        </html>
      `);
      janela.document.close();
      janela.print();
    }
  </script>
</body>
</html>
