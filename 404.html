<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta http-equiv="Content-Security-Policy"
  content="default-src 'self'; connect-src 'self' https://dyvwcrmtminwcwyteynm.supabase.co; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline';">
<title>Robot Mission</title>

<style>
body {
  margin: 0;
  background: radial-gradient(#0b1d2a, #000);
  font-family: Arial, sans-serif;
  color: #00e5ff;
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
}

.menu {
  text-align: center;
  max-width: 620px;
}

h1 {
  font-size: 48px;
  margin-bottom: 8px;
  text-shadow: 0 0 15px #00e5ff;
}

p {
  color: #ccc;
  margin-bottom: 24px;
}

button {
  padding: 15px 40px;
  font-size: 20px;
  border: none;
  border-radius: 8px;
  background: #00e5ff;
  color: #000;
  cursor: pointer;
  box-shadow: 0 0 20px #00e5ff;
  transition: 0.2s;
}

button:hover {
  background: #00bcd4;
}

.loading {
  margin-top: 16px;
  display: none;
  font-size: 14px;
  color: #aaa;
}

.tip-box {
  margin-top: 26px;
  min-height: 40px;
  font-size: 15px;
  color: #ddd;
  opacity: 0;
  transition: opacity 0.6s ease;
}

.tip-box.show {
  opacity: 1;
}

.visitor-counter {
  margin-top: 32px;
  font-size: 13px;
  color: #555;
  letter-spacing: 1px;
  text-transform: uppercase;
}

.visitor-counter span {
  color: #00e5ff;
  font-size: 16px;
  font-weight: bold;
  margin-left: 6px;
  text-shadow: 0 0 8px #00e5ff88;
}
</style>
</head>

<body>

<div class="menu">
  <h1>ROBOT MISSION</h1>
  <p>Um jogo de ação futurista</p>

  <button onclick="startGame()">▶ INICIAR</button>

  <div class="tip-box" id="tip"></div>

  <div class="loading" id="loading">
    Carregando jogo...
  </div>

  <div class="visitor-counter">
    Visitas:<span id="visit-count">...</span>
  </div>
</div>

<script>
// =============================================
// CONFIGURAÇÃO SUPABASE
// =============================================
const SUPABASE_URL = "https://dyvwcrmtminwcwyteynm.supabase.co";
const SUPABASE_KEY = "sb_publishable_aLscpSRu7Y0T2e4QjviYYA_ZAFhqZAH";

// =============================================
// CONTADOR GLOBAL
// =============================================
async function incrementarVisitas() {
  try {
    const res = await fetch(`${SUPABASE_URL}/rest/v1/rpc/incrementar_visitas`, {
      method: "POST",
      headers: {
        "apikey": SUPABASE_KEY,
        "Authorization": "Bearer " + SUPABASE_KEY,
        "Content-Type": "application/json"
      },
      body: JSON.stringify({})
    });

    if (res.ok) {
      const total = await res.json();
      document.getElementById("visit-count").textContent =
        Number(total).toLocaleString("pt-BR");
    } else {
      await lerVisitas();
    }
  } catch (e) {
    document.getElementById("visit-count").textContent = "–";
  }
}

async function lerVisitas() {
  try {
    const res = await fetch(`${SUPABASE_URL}/rest/v1/contador?select=visitas&id=eq.1`, {
      headers: {
        "apikey": SUPABASE_KEY,
        "Authorization": "Bearer " + SUPABASE_KEY
      }
    });
    const data = await res.json();
    if (data && data[0]) {
      document.getElementById("visit-count").textContent =
        Number(data[0].visitas).toLocaleString("pt-BR");
    }
  } catch (e) {
    document.getElementById("visit-count").textContent = "–";
  }
}

incrementarVisitas();

// =============================================
// DICAS
// =============================================
const tips = [
  "🔫 O revólver possui apenas 4 balas. Recarregue com sabedoria.",
  "📦 Munição extra vai para a reserva automaticamente.",
  "🔑 Baús só podem ser abertos com chave.",
  "🏪 A loja vende chave, vida e munição.",
  "🛡️ Alguns inimigos podem defender tiros.",
  "🎯 Complete missões para ganhar moedas.",
  "💣 Robôs atiradores explodem se você chegar perto.",
  "⌨️ Use E para interagir e Espaço para atacar."
];

tips.sort(() => Math.random() - 0.5);

let tipIndex = 0;
const tipEl = document.getElementById("tip");

function showTip() {
  tipEl.classList.remove("show");
  setTimeout(() => {
    tipEl.textContent = tips[tipIndex];
    tipEl.classList.add("show");
    tipIndex = (tipIndex + 1) % tips.length;
  }, 300);
}

showTip();
setInterval(showTip, 3500);

// =============================================
// INICIAR JOGO
// =============================================
function startGame() {
  document.querySelector("button").style.display = "none";
  document.getElementById("loading").style.display = "block";
  setTimeout(() => {
    window.location.href = "index.html";
  }, 800);
}
</script>

</body>
</html>
