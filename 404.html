<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Chat com Davi</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #0d1117;
      color: #c9d1d9;
      display: flex;
      flex-direction: column;
      height: 100vh;
    }

    header {
      padding: 15px;
      text-align: center;
      background: #161b22;
      border-bottom: 1px solid #30363d;
      font-size: 18px;
    }

    #chat {
      flex: 1;
      overflow-y: auto;
      padding: 15px;
    }

    .msg {
      margin-bottom: 10px;
      padding: 10px;
      border-radius: 10px;
      max-width: 70%;
    }

    .user {
      background: #238636;
      align-self: flex-end;
    }

    .davi {
      background: #1f6feb;
      align-self: flex-start;
    }

    #form {
      display: flex;
      border-top: 1px solid #30363d;
    }

    #input {
      flex: 1;
      padding: 10px;
      border: none;
      outline: none;
      background: #0d1117;
      color: white;
    }

    button {
      padding: 10px 20px;
      border: none;
      background: #1f6feb;
      color: white;
      cursor: pointer;
    }
  </style>
</head>
<body>

<header>💬 Chat direto com Davi</header>

<div id="chat"></div>

<form id="form">
  <input id="input" placeholder="Digite sua mensagem..." required />
  <button type="submit">Enviar</button>
</form>

<script>
  const supabaseUrl = 'https://gqwcgaahjqklgmrswytb.supabase.co';
  const supabaseKey = 'sb_publishable_bkCd5J8y1e4GszEv4S45yQ_YLZ48Wis';
  const supabase = supabase.createClient(supabaseUrl, supabaseKey);

  const chat = document.getElementById('chat');
  const form = document.getElementById('form');
  const input = document.getElementById('input');

  function addMessage(text, type) {
    const div = document.createElement('div');
    div.classList.add('msg', type);
    div.innerText = text;
    chat.appendChild(div);
    chat.scrollTop = chat.scrollHeight;
  }

  async function loadMessages() {
    const { data, error } = await supabase
      .from('messages')
      .select('*')
      .order('id', { ascending: true });

    if (error) return console.error(error);

    chat.innerHTML = '';
    data.forEach(msg => {
      addMessage(msg.text, msg.sender === 'user' ? 'user' : 'davi');
    });
  }

  form.addEventListener('submit', async (e) => {
    e.preventDefault();

    const text = input.value;

    await supabase
      .from('messages')
      .insert([{ text, sender: 'user' }]);

    input.value = '';
  });

  // Tempo real
  supabase
    .channel('chat')
    .on('postgres_changes', { event: 'INSERT', schema: 'public', table: 'messages' }, payload => {
      const msg = payload.new;
      addMessage(msg.text, msg.sender === 'user' ? 'user' : 'davi');
    })
    .subscribe();

  loadMessages();
</script>

</body>
</html>
