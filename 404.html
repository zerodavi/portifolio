<!-- ===================== index.html (PORTAL MELHORADO) ===================== -->
<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Portal de Notícias</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

body{
  font-family:Arial, sans-serif;
  background:#0d1117;
  color:#fff;
}

/* TOPO */
header{
  background:#161b22;
  padding:20px;
  text-align:center;
  border-bottom:2px solid #222;
}

header h1{
  font-size:32px;
  margin-bottom:10px;
}

header a{
  display:inline-block;
  padding:10px 18px;
  background:#238636;
  color:#fff;
  border-radius:8px;
  text-decoration:none;
  font-weight:bold;
  transition:0.3s;
}

header a:hover{
  background:#2ea043;
}

/* CONTAINER */
.container{
  max-width:1100px;
  margin:auto;
  padding:25px;
}

/* GRID */
#noticias{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(320px,1fr));
  gap:20px;
}

/* CARD */
.card{
  background:#161b22;
  border-radius:14px;
  overflow:hidden;
  box-shadow:0 5px 15px rgba(0,0,0,0.4);
  transition:0.3s;
}

.card:hover{
  transform:translateY(-5px);
}

.card img{
  width:100%;
  height:220px;       /* TAMANHO FIXO */
  object-fit:cover;   /* CORTA SEM DISTORCER */
  display:block;
}

.card-content{
  padding:18px;
}

.card h2{
  font-size:22px;
  margin-bottom:12px;
  color:#58a6ff;
}

.card p{
  color:#c9d1d9;
  line-height:1.5;
}

/* MOBILE */
@media(max-width:600px){
  header h1{
    font-size:24px;
  }

  .card img{
    height:180px;
  }
}
</style>
</head>

<body>

<header>
  <h1>📰 Portal de Notícias</h1>
  <a href="adm.html">Ir para ADM</a>
</header>

<div class="container">
  <div id="noticias"></div>
</div>

<script>
const client = supabase.createClient(
  "https://gqwcgaahjqklgmrswytb.supabase.co",
  "sb_publishable_bkCd5J8y1e4GszEv4S45yQ_YLZ48Wis"
);

async function carregarNoticias(){
  const { data } = await client
    .from('noticias')
    .select('*')
    .order('id',{ascending:false});

  const div = document.getElementById('noticias');
  div.innerHTML = '';

  data.forEach(n => {
    div.innerHTML += `
      <div class="card">
        <img src="${n.imagem}">
        <div class="card-content">
          <h2>${n.titulo}</h2>
          <p>${n.conteudo.substring(0,120)}...</p>
        </div>
      </div>
    `;
  });
}

carregarNoticias();
</script>

</body>
</html>
