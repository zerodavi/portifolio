<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Admin - Publicar</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
<style>
body{font-family:Arial;background:#0d1117;color:#fff}
.container{padding:20px}
input,textarea{width:100%;margin:10px 0;padding:10px;border-radius:5px;border:none}
button{padding:10px;background:#238636;color:#fff;border:none;border-radius:5px}
</style>
</head>
<body>
<div class="container">
<h1>Painel ADM</h1>
<a href="index.html">⬅ Voltar</a>
<input type="text" id="titulo" placeholder="Título">
<textarea id="conteudo" placeholder="Conteúdo"></textarea>
<input type="file" id="imagem">
<button onclick="publicar()">Publicar</button>
</div>

<script>
const client = supabase.createClient(
  "https://gqwcgaahjqklgmrswytb.supabase.co",
  "sb_publishable_bkCd5J8y1e4GszEv4S45yQ_YLZ48Wis"
);

async function publicar(){
  const titulo = document.getElementById('titulo').value;
  const conteudo = document.getElementById('conteudo').value;
  const file = document.getElementById('imagem').files[0];

  let urlImagem = '';

  if(file){
    const nome = Date.now() + "_" + Math.random() + "_" + file.name;

    // 🔴 UPLOAD COM VERIFICAÇÃO
    const { data: uploadData, error: uploadError } = await client.storage
      .from('imagens')
      .upload(nome, file);

    if(uploadError){
      alert("Erro no upload: " + uploadError.message);
      console.error(uploadError);
      return;
    }

    // 🔴 GERAR URL
    const { data } = client.storage
      .from('imagens')
      .getPublicUrl(nome);

    urlImagem = data.publicUrl;
  }

  // 🔴 INSERT COM VERIFICAÇÃO
  const { error } = await client.from('noticias').insert([
    { titulo, conteudo, imagem: urlImagem }
  ]);

  if(error){
    alert("Erro ao salvar: " + error.message);
    console.error(error);
  } else {
    alert("Notícia publicada!");
    location.reload();
  }
}
</script>
</body>
</html>
